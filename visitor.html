<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VISITOR">

  <title>VISITOR Counter</title>
  <style>
    :root {
      --thai-color: rgba(0, 122, 255, 0.85);
      --non-thai-color: rgba(52, 199, 89, 0.85);
      --minus-color: rgba(255, 59, 48, 0.9);
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* VISITOR専用：注意を惹きつける鮮やかなオレンジ・ゴールドのヘッダー */
    .header {
      background: linear-gradient(135deg, rgba(230, 90, 10, 0.95), rgba(245, 140, 20, 0.95));
      padding: 25px;
      text-align: center;
      font-size: 55px; /* 文字を特大に */
      font-weight: 900;
      color: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      z-index: 10;
      letter-spacing: 4px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .container {
      display: flex;
      flex: 1;
      padding: 25px;
      gap: 25px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      text-align: center;
      font-size: 45px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0;
    }

    .counter-display {
      font-size: 120px;
      font-weight: 800;
      color: #ffffff;
      text-align: center;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: auto 0;
    }

    .button-group {
      display: flex;
      gap: 20px;
      height: 25%;
    }

    .btn {
      border: none;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.1s;
      display: flex;
      justify-content: center;
      align-items: center;
      text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
    }

    .btn:active { transform: scale(0.95); }
    .btn-plus { flex: 2; font-size: 65px; }
    .card-thai .btn-plus { background-color: var(--thai-color); }
    .card-non-thai .btn-plus { background-color: var(--non-thai-color); }
    .btn-minus { flex: 1; font-size: 45px; background-color: var(--minus-color); }
  </style>
</head>
<body>

  <div class="header">VISITOR</div>
  
  <div class="container">
    <div class="card card-thai">
      <h2 class="card-title">THAI</h2>
      <div class="counter-display" id="count-v-thai">0</div>
      <div class="button-group">
        <button class="btn btn-minus" onclick="handleClick('Visitor-Thai', -1)">−</button>
        <button class="btn btn-plus" onclick="handleClick('Visitor-Thai', 1)">＋</button>
      </div>
    </div>

    <div class="card card-non-thai">
      <h2 class="card-title">NON THAI</h2>
      <div class="counter-display" id="count-v-non-thai">0</div>
      <div class="button-group">
        <button class="btn btn-minus" onclick="handleClick('Visitor-NonThai', -1)">−</button>
        <button class="btn btn-plus" onclick="handleClick('Visitor-NonThai', 1)">＋</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxIZEpf7CUc8tx0NUEKLmMIZqHpm8nPTfiQoRf9RNM4v9be4-wupokeSOI6CTagOc5w/exec";

    let currentCounts = { vThai: 0, vNonThai: 0 };

    window.addEventListener('DOMContentLoaded', fetchCurrentCounts);
    setInterval(fetchCurrentCounts, 10000);

    function handleClick(type, value) {
      if (type === 'Visitor-Thai') {
        currentCounts.vThai = Math.max(0, currentCounts.vThai + value);
        document.getElementById('count-v-thai').innerText = currentCounts.vThai;
      } else if (type === 'Visitor-NonThai') {
        currentCounts.vNonThai = Math.max(0, currentCounts.vNonThai + value);
        document.getElementById('count-v-non-thai').innerText = currentCounts.vNonThai;
      }
      sendCountBackend(type, value);
    }

    async function sendCountBackend(type, value) {
      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ type: type, value: value })
        });
      } catch (error) { console.error("Backend send failed:", error); }
    }

    async function fetchCurrentCounts() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        if (data) {
          currentCounts.vThai = data.vThai;
          currentCounts.vNonThai = data.vNonThai;
          document.getElementById('count-v-thai').innerText = currentCounts.vThai;
          document.getElementById('count-v-non-thai').innerText = currentCounts.vNonThai;
        }
      } catch (error) { console.error("Fetch failed:", error); }
    }
  </script>
</body>
</html>
