<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COUNTER">

  <title>参拝者カウンター</title>
  <style>
    :root {
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none !important;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Hiragino Kaku Gothic ProN, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
 
    body.gold-aura-active::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(0, 0, 0, 0.4) 100%);
      z-index: 9997;
      pointer-events: none;
      animation: auraGlow 3s ease-in-out infinite alternate;
    }

    @keyframes auraGlow {
      0% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .grand-total-container {
      background: rgba(30, 25, 20, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      padding: 12px 45px;
      margin-top: 30px;
      margin-bottom: -10px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05);
      z-index: 50;
      animation: pulseGlow 3s infinite alternate;
      cursor: pointer;
      
      transform: translate3d(0, 0, 0) scale(1);
      will-change: transform;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.4s;
      touch-action: none !important; 
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05); }
      100% { box-shadow: 0 12px 40px rgba(212, 175, 55, 0.35), inset 0 0 25px rgba(212, 175, 55, 0.1); }
    }

    .grand-total-container.milestone-active {
      transform: translate3d(0, calc(50vh - 120px), 0) scale(1.6) !important;
      z-index: 10000;
      background: rgba(15, 12, 10, 0.95);
      border: 2px solid rgba(255, 215, 0, 0.8);
      pointer-events: none;
    }

    .grand-total-container.milestone-active .grand-total-title {
      color: #ffffff !important;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.9), 0 0 20px rgba(255, 140, 0, 0.6) !important;
    }

    .grand-total-container.milestone-active .grand-total-number {
      color: #ffffff !important;
      font-size: 72px !important;
      animation: goldGlowText 1.5s infinite ease-in-out;
    }

    @keyframes goldGlowText {
      0% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.9), 0 0 20px rgba(255, 215, 0, 0.7); }
      50% { text-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 35px rgba(255, 215, 0, 1), 0 0 55px rgba(255, 140, 0, 0.9); }
      100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.9), 0 0 20px rgba(255, 215, 0, 0.7); }
    }

    .grand-total-title {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      text-shadow: 0 0 4px rgba(212, 175, 55, 0.9), 1px 2px 3px rgba(0,0,0,0.8);
      margin: 0;
      pointer-events: none;
    }

    .grand-total-display-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 4px;
      pointer-events: none;
    }

    .grand-total-number {
      font-size: 48px;
      font-weight: 800;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.4), 2px 3px 8px rgba(0,0,0,0.9);
      line-height: 1;
      transition: font-size 0.3s, color 0.3s;
    }

    .container {
      display: flex;
      flex: 1;
      width: 100%;
      padding: 35px;
      gap: 30px;
      box-sizing: border-box;
      z-index: 10;
      touch-action: none !important;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 35px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .title-member {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(0, 118, 255, 0.8), 2px 2px 5px rgba(0,0,0,0.5);
      margin: 10px 0 20px 0;
      text-align: center;
      z-index: 6;
    }

    .title-visitor {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(16, 185, 129, 0.8), 2px 2px 5px rgba(0,0,0,0.5);
      margin: 10px 0 20px 0;
      text-align: center;
      z-index: 6;
    }

    .counter-display {
      font-size: 150px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 0 0 10px 0;
      z-index: 6;
      line-height: 1;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
      pointer-events: none; 
    }

    .ripple-button {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.05s;
      z-index: 3;
      cursor: pointer;
      pointer-events: auto; 
      touch-action: manipulation !important;
    }

    .btn-visitor-color {
      background: radial-gradient(circle, rgba(167, 243, 208, 0.95) 0%, rgba(16, 185, 129, 0.45) 70%, rgba(52, 211, 153, 0) 100%) !important;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6) !important;
    }

    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      margin-top: -110px;
      margin-left: -110px;
      border-radius: 50%;
      border: 3px solid rgba(0, 225, 255, 0.85);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none; 
      z-index: 4;
      animation: rippleSpread 4.0s cubic-bezier(0.1, 0.2, 0.3, 1) forwards;
    }

    .ripple-visitor {
      border: 3px solid rgba(52, 211, 153, 0.85) !important;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.1) 0%, rgba(52, 211, 153, 0) 70%) !important;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 5px; }
      20% { opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; border-width: 0.5px; }
    }

    .ripple-button:active {
      transform: scale(0.92);
    }

    .walking-step {
      position: absolute;
      width: 350px;
      height: 350px;
      opacity: 0;
      pointer-events: none; 
      z-index: 2;
    }

    @keyframes walkUpLeft {
      0% { transform: translateY(300px) translateX(-60px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-150px) translateX(-60px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-220px) translateX(-60px) rotate(-10deg); opacity: 0; }
    }

    @keyframes walkUpRight {
      0% { transform: translateY(160px) translateX(60px) rotate(10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-280px) translateX(60px) rotate(10deg); opacity: 0.75; }
      100% { transform: translateY(-350px) translateX(60px) rotate(10deg); opacity: 0; }
    }

    @keyframes walkUpFinal {
      0% { transform: translateY(20px) translateX(-40px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-420px) translateX(-40px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-500px) translateX(-40px) rotate(-10deg) scale(0.85); opacity: 0; }
    }

    .sange-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none; 
      z-index: 999;
      perspective: 1000px;
    }

    .sange-petal-wrapper {
      position: absolute;
      top: -140px; 
      pointer-events: none;
      animation: sangeFallLinear linear forwards;
    }

    .sange-petal {
      width: 100%;
      height: 100%;
      fill-opacity: 0.88;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
      transform-origin: center;
    }

    @keyframes sangeFallLinear {
      0% { transform: translateY(0); opacity: 0; }
      8% { opacity: 1; }
      92% { opacity: 1; }
      100% { transform: translateY(115vh); opacity: 0; }
    }

    @keyframes sangeSwayLeft {
      0% { transform: translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      25% { transform: translateX(-80px) rotateX(20deg) rotateY(50deg) rotateZ(20deg); }
      50% { transform: translateX(0) rotateX(10deg) rotateY(110deg) rotateZ(0deg); }
      75% { transform: translateX(80px) rotateX(25deg) rotateY(50deg) rotateZ(-20deg); }
      100% { transform: translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    }

    @keyframes sangeSwayRight {
      0% { transform: translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
      25% { transform: translateX(85px) rotateX(-15deg) rotateY(-45deg) rotateZ(-25deg); }
      50% { transform: translateX(0) rotateX(-25deg) rotateY(-120deg) rotateZ(0deg); }
      75% { transform: translateX(-85px) rotateX(-10deg) rotateY(-45deg) rotateZ(25deg); }
      100% { transform: translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    }
    
    .flash-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #ffffff;
      z-index: 99999;
      pointer-events: none; 
      opacity: 0;
    }
    
    .flash-overlay.flash-trigger {
      animation: flashAnim 0.6s ease-out forwards;
    }
    @keyframes flashAnim {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .milestone-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .milestone-backdrop.active {
      opacity: 1;
    }

    .gold-glitter {
      position: fixed;
      pointer-events: none; 
      z-index: 9999;
      background: radial-gradient(circle, #ffffff 10%, #fff3a1 50%, #ffd700 100%);
      border-radius: 50%;
      filter: drop-shadow(0 0 6px #ffd700);
      animation: glitterFall linear forwards;
    }

    @keyframes glitterFall {
      0% { transform: translateY(-50px) translateX(0) scale(0); opacity: 0; }
      10% { opacity: 1; transform: translateY(10vh) translateX(var(--sway-x)) scale(1); }
      90% { opacity: 1; }
      100% { transform: translateY(115vh) translateX(calc(var(--sway-x) * 2)) scale(0.2); opacity: 0; }
    }
  </style>
</head>
<body>

  <svg style="width:0; height:0; position:absolute;">
    <defs>
      <radialGradient id="sange-pink" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#fff0f5" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#fba3c8" stop-opacity="0.95"/>
      </radialGradient>
      <radialGradient id="sange-blue" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#f0f8ff" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#aadaf8" stop-opacity="0.95"/>
      </radialGradient>
      <radialGradient id="sange-green" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#f5fffa" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#b4dcad" stop-opacity="0.95"/>
      </radialGradient>
      <radialGradient id="sange-yellow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#fffff0" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#fcefa6" stop-opacity="0.95"/>
      </radialGradient>
      <radialGradient id="sange-purple" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#f8f4ff" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#d1c2f0" stop-opacity="0.95"/>
      </radialGradient>
      
      <g id="sange-petal-shape">
        <path d="M 25,45 C 5,35 5,15 25,5 C 45,15 45,35 25,45 Z" />
        <path d="M 25,45 C 12,38 12,22 25,12 C 38,22 38,38 25,45 Z" fill="rgba(255,255,255,0.3)" />
        <path d="M 25,45 L 25,8" stroke="rgba(255,255,255,0.6)" stroke-width="0.8" />
      </g>
    </defs>
  </svg>

  <div class="flash-overlay" id="flash-layer"></div>
  <div class="milestone-backdrop" id="milestone-backdrop"></div>
  <div class="sange-container" id="sange-layer"></div>
  
  <div class="grand-total-container" id="grand-total-box">
    <div class="grand-total-title">Total Attendance</div>
    <div class="grand-total-display-wrapper">
      <div class="grand-total-number" id="grand-total">0</div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2 class="title-member">MEMBER</h2>
      <div class="counter-display" id="count-member">0</div>
      <div class="footprint-zone">
        <div class="ripple-button" id="btn-member"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="title-visitor">VISITOR</h2>
      <div class="counter-display" id="count-visitor">0</div>
      <div class="footprint-zone">
        <div class="ripple-button btn-visitor-color" id="btn-visitor"></div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ ここにご自身のGAS WebアプリURLを貼り付けてください
    const gasUrl = 'https://script.google.com/macros/s/AKfycbzeFoq7wvgUKFwhOm3SJlV0zKJ7Gn9opHu-9aUEoErlqWAk26fm2C1cBUiTCVQWd9z_/exec'; 
    
    let requestQueue = JSON.parse(localStorage.getItem('gas_request_queue') || '[]');
    let isSending = false;
    let queueIntervalId = null; 
    let isMilestoneMode = false;

    window.addEventListener('DOMContentLoaded', () => {
      initLocalStorage();
      updateDisplay();
      setupLongPress(); 
      setupClickEvents();
      
      window.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { passive: false });
      document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
      
      startQueueTimer();
    });

    function initLocalStorage() {
      const keys = ['today_member', 'today_visitor', 'total_member', 'total_visitor'];
      keys.forEach(key => {
        let val = localStorage.getItem(key);
        if (val === null || val === undefined || isNaN(parseInt(val, 10))) {
          localStorage.setItem(key, '0');
        }
      });
      if (!localStorage.getItem('lastSavedDate')) {
        localStorage.setItem('lastSavedDate', getFixedTodayString());
      }
    }

    function startQueueTimer() {
      if (!queueIntervalId) {
        queueIntervalId = setInterval(() => {
          setTimeout(processQueue, 0);
        }, 15000); 
      }
    }

    function stopQueueTimer() {
      if (queueIntervalId) {
        clearInterval(queueIntervalId);
        queueIntervalId = null;
      }
    }

    function getFixedTodayString() {
      const d = new Date();
      const formatter = new Intl.DateTimeFormat('en-US', {
        year: 'numeric', month: '2-digit', day: '2-digit', calendar: 'gregory'
      });
      const parts = formatter.formatToParts(d);
      let year = parts.find(p => p.type === 'year').value;
      const month = parts.find(p => p.type === 'month').value;
      const day = parts.find(p => p.type === 'day').value;
      
      // 🌟 【最強の二重防壁】タイ仏暦（2569年など）を確実に西暦（2026年）へ強制変換
      let yearNum = parseInt(year, 10);
      if (yearNum > 2500) {
        yearNum = yearNum - 543;
        year = yearNum.toString();
      }
      return `${year}-${month}-${day}`;
    }

    function setupClickEvents() {
      const btnMember = document.getElementById('btn-member');
      const btnVisitor = document.getElementById('btn-visitor');

      const handleEvent = (type, el, e) => {
        e.preventDefault();
        e.stopPropagation();
        if (isMilestoneMode) return; 
        handleCounterClick(type, el);
      };
      btnMember.addEventListener('touchstart', (e) => handleEvent('member', btnMember, e), { passive: false });
      btnVisitor.addEventListener('touchstart', (e) => handleEvent('visitor', btnVisitor, e), { passive: false });
    }

    function setupLongPress() {
      const target = document.getElementById('grand-total-box');
      let pressTimer;
      let startX, startY;
      const moveThreshold = 10; 

      const startPress = (e) => {
        if (isMilestoneMode) return;
        if (e.touches && e.touches[0]) {
          startX = e.touches[0].clientX; startY = e.touches[0].clientY;
        } else {
          startX = e.clientX; startY = e.clientY;
        }
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => { triggerResetAuth(); }, 2000); 
      };
      const cancelPress = (e) => { clearTimeout(pressTimer); };
      const movePress = (e) => {
        if (e.touches && e.touches[0]) {
          const distance = Math.sqrt(Math.pow(e.touches[0].clientX - startX, 2) + Math.pow(e.touches[0].clientY - startY, 2));
          if (distance > moveThreshold) { clearTimeout(pressTimer); }
        }
      };
      target.addEventListener('touchstart', startPress, { passive: true });
      target.addEventListener('touchmove', movePress, { passive: true });
      target.addEventListener('touchend', cancelPress, { passive: true });
      target.addEventListener('touchcancel', cancelPress, { passive: true });
    }
    
    function triggerResetAuth() {
      const password = prompt("Please enter the admin password to reset:");
      if (password === null) return; 
      
      if (password === "0425") {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('total_member', '0');
        localStorage.setItem('total_visitor', '0');
        localStorage.removeItem('last_celebrated_milestone');
        requestQueue = [];
        localStorage.setItem('gas_request_queue', JSON.stringify(requestQueue));
        updateDisplay();
        alert("Counter reset successfully.");
      } else {
        alert("Incorrect password.");
      }
    }

    function checkDateReset() {
      const todayStr = getFixedTodayString();
      if (localStorage.getItem('lastSavedDate') !== todayStr) {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('lastSavedDate', todayStr);
        requestQueue = [];
        localStorage.setItem('gas_request_queue', JSON.stringify(requestQueue));
      }
    }

    function updateDisplay() {
      checkDateReset();
      let tMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let tVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalM = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalV = parseInt(localStorage.getItem('total_visitor') || '0', 10);
      
      if(isNaN(tMember)) tMember = 0;
      if(isNaN(tVisitor)) tVisitor = 0;
      if(isNaN(totalM)) totalM = 0;
      if(isNaN(totalV)) totalV = 0;

      let grandTotal = totalM + totalV;
      document.getElementById('count-member').innerText = tMember;
      document.getElementById('count-visitor').innerText = tVisitor;
      document.getElementById('grand-total').innerText = grandTotal.toLocaleString();

      checkMilestoneCelebration(grandTotal);
    }

    function checkMilestoneCelebration(grandTotal) {
      if (grandTotal <= 0) return;
      if (grandTotal % 10 === 0) { // ★本番運用時は grandTotal % 1000 === 0 に変更
        const lastCelebrated = parseInt(localStorage.getItem('last_celebrated_milestone') || '0', 10);
        if (grandTotal !== lastCelebrated) {
          localStorage.setItem('last_celebrated_milestone', grandTotal.toString());
          triggerMilestoneCelebration();
        }
      }
    }

    function triggerMilestoneCelebration() {
      isMilestoneMode = true;
      stopQueueTimer();

      triggerSangeEffect();
      triggerGoldGlitterShower();

      const flash = document.getElementById('flash-layer');
      flash.classList.add('flash-trigger');
      setTimeout(() => { flash.classList.remove('flash-trigger'); }, 600);

      const backdrop = document.getElementById('milestone-backdrop');
      const totalBox = document.getElementById('grand-total-box');
      
      backdrop.classList.add('active');
      document.body.classList.add('gold-aura-active');
      totalBox.classList.add('milestone-active');

      setTimeout(() => {
        backdrop.classList.remove('active');
        document.body.classList.remove('gold-aura-active');
        totalBox.classList.remove('milestone-active');
        
        isMilestoneMode = false; 
        startQueueTimer();
        setTimeout(processQueue, 0);
      }, 3000);
    }
    
    function triggerGoldGlitterShower() {
      const sangeLayer = document.getElementById('sange-layer');
      for (let i = 0; i < 35; i++) {
        const glitter = document.createElement('div');
        glitter.className = 'gold-glitter';
        const size = 6 + Math.random() * 12;
        glitter.style.width = `${size}px`;
        glitter.style.height = `${size}px`;
        glitter.style.left = `${Math.random() * 100}%`;
        glitter.style.top = `-20px`;
        glitter.style.setProperty('--sway-x', `${-80 + Math.random() * 160}px`);

        const delay = Math.random() * 4.0;
        const duration = 6.0 + Math.random() * 4.0;
        glitter.style.animationDelay = `${delay}s`;
        glitter.style.animationDuration = `${duration}s`;
        sangeLayer.appendChild(glitter);
        setTimeout(() => { glitter.remove(); }, (delay + duration) * 1000);
      }
    }

    function triggerSangeEffect() {
      const sangeLayer = document.getElementById('sange-layer');
      const colors = ['pink', 'blue', 'green', 'yellow', 'purple'];

      for (let i = 0; i < 25; i++) {
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        const wrapper = document.createElement('div');
        wrapper.className = 'sange-petal-wrapper';

        const svgNS = "http://www.w3.org/2000/svg";
        const svgPetal = document.createElementNS(svgNS, "svg");
        svgPetal.setAttribute("class", "sange-petal");
        svgPetal.setAttribute("viewBox", "0 0 50 50");
        svgPetal.setAttribute("fill", `url(#sange-${randomColor})`);

        const useTag = document.createElementNS(svgNS, "use");
        useTag.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#sange-petal-shape");
        svgPetal.appendChild(useTag);
        wrapper.appendChild(svgPetal);

        const size = 75 + Math.random() * 40;
        wrapper.style.width = `${size}px`;
        wrapper.style.height = `${size}px`;
        wrapper.style.left = `${Math.random() * 95}%`;

        const animationDelay = Math.random() * 5.5;
        const fallDuration = 8.0 + Math.random() * 4.0;
        const swayDuration = 3.0 + Math.random() * 2.5;

        wrapper.style.animationDelay = `${animationDelay}s`;
        wrapper.style.animationDuration = `${fallDuration}s`;
        const swayType = Math.random() > 0.5 ? 'sangeSwayLeft' : 'sangeSwayRight';
        svgPetal.style.animation = `${swayType} ${swayDuration}s ease-in-out infinite`;

        sangeLayer.appendChild(wrapper);
        setTimeout(() => { wrapper.remove(); }, (animationDelay + fallDuration) * 1000);
      }
    }

    function handleCounterClick(type, circleElement) {
      checkDateReset();
      let todayMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let todayVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalMember = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalVisitor = parseInt(localStorage.getItem('total_visitor') || '0', 10);

      if(isNaN(todayMember)) todayMember = 0;
      if(isNaN(todayVisitor)) todayVisitor = 0;
      if(isNaN(totalMember)) totalMember = 0;
      if(isNaN(totalVisitor)) totalVisitor = 0;

      if (type === 'member') {
        todayMember++; totalMember++;
      } else {
        todayVisitor++; totalVisitor++;
      }

      localStorage.setItem('today_member', todayMember.toString());
      localStorage.setItem('today_visitor', todayVisitor.toString());
      localStorage.setItem('total_member', totalMember.toString());
      localStorage.setItem('total_visitor', totalVisitor.toString());

      updateDisplay();
      createTripleRipple(circleElement, type);
      spawnFootprints(circleElement.parentElement);

      const payload = {
        type: "click_counter",
        date: getFixedTodayString(), 
        memberToday: todayMember,
        visitorToday: todayVisitor,
        totalToday: todayMember + todayVisitor
      };

      // 🌟 最新状態のみに「上書き」してキューの渋滞を物理的に排除
      requestQueue = [payload];
      localStorage.setItem('gas_request_queue', JSON.stringify(requestQueue));
      
      if(!isSending) {
        setTimeout(processQueue, 0);
      }
    }
    
    function createTripleRipple(button, type) {
      const delays = [0, 700, 1400];
      delays.forEach(delay => {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          if (type === 'visitor') { ripple.classList.add('ripple-visitor'); }
          button.appendChild(ripple);
          setTimeout(() => ripple.remove(), 4000);
        }, delay);
      });
    }
    
    function spawnFootprints(zone) {
      const animations = ['walkUpLeft', 'walkUpRight', 'walkUpFinal'];
      const svgs = [leftFootSVG, rightFootSVG, leftFootSVG];
      const delays = [0, 650, 1300];
      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 2400);
        }, delays[index]);
      });
    }

    const leftFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(20, 20, 20, 0.75); filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.4));"><path d="M52,85 C45,85 42,75 44,62 C46,52 38,44 40,34 C42,26 52,25 56,32 C60,39 56,48 58,58 C60,68 60,85 52,85 Z"/><circle cx="61" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="41" cy="19" r="4"/></svg>`;
    const rightFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(20, 20, 20, 0.75); filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.4));"><path d="M48,85 C55,85 58,75 56,62 C54,52 62,44 60,34 C58,26 48,25 44,32 C40,39 44,48 42,58 C40,68 40,85 48,85 Z"/><circle cx="39" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="59" cy="19" r="4"/></svg>`;

    function processQueue() {
      if (isSending || requestQueue.length === 0) return;

      isSending = true;
      const currentPayload = requestQueue[0];

      fetch(gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(currentPayload)
      })
      .then(res => {
        if (!res.ok) throw new Error("Server response error");
        return res.json().catch(() => ({ status: "success" })); 
      })
      .then(resData => {
        // 🌟 GAS側が成功を返した時だけキューから削除（厳密化）
        if (resData && resData.status === "success") {
          requestQueue.shift(); 
          localStorage.setItem('gas_request_queue', JSON.stringify(requestQueue)); 
        } else {
          throw new Error(resData.message || "GAS error");
        }
      })
      .catch(err => { 
        console.error("Waiting to retry automatic data transmission:", err); 
      })
      .finally(() => {
        isSending = false;
        if (requestQueue.length > 0) {
          setTimeout(processQueue, 5000); // エラー時は5秒後に安全に再試行
        }
      });
    }

    window.addEventListener('online', () => { setTimeout(processQueue, 0); });
    setInterval(() => {
      checkDateReset();
      setTimeout(processQueue, 0);
    }, 30000);
  </script>
