<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COUNTER">
  <title>Attendance Counter</title>
  <style>
    :root { --bg-glass: rgba(255, 255, 255, 0.25); }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background-image: url('外観.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; height: 100vh; overflow: hidden; -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

    /* 画面フラッシュ */
    .flash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #ffffff; opacity: 0; pointer-events: none; z-index: 9999; }
    .flash-active { animation: flashAnim 0.8s ease-out forwards; }
    @keyframes flashAnim { 0% { opacity: 0.9; } 100% { opacity: 0; } }

    .grand-total-container { background: rgba(30, 25, 20, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50px; padding: 12px 45px; margin-top: 30px; margin-bottom: -10px; text-align: center; box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05); z-index: 50; animation: pulseGlow 3s infinite alternate; cursor: pointer; transition: all 0.5s ease-in-out; }
    @keyframes pulseGlow { 0% { box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05); } 100% { box-shadow: 0 12px 40px rgba(212, 175, 55, 0.4), inset 0 0 25px rgba(212, 175, 55, 0.15); } }
    .grand-total-title { font-size: 18px; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: 2.5px; text-shadow: 0 0 4px rgba(212, 175, 55, 0.9), 0 0 10px rgba(212, 175, 55, 0.8), 0 0 18px rgba(212, 175, 55, 0.6), 1px 2px 3px rgba(0,0,0,0.8); margin: 0; pointer-events: none; }
    .grand-total-display-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 4px; pointer-events: none; }
    .grand-total-number { font-size: 48px; font-weight: 800; color: #ffffff; font-variant-numeric: tabular-nums; text-shadow: 0 0 12px rgba(212, 175, 55, 0.4), 2px 3px 8px rgba(0,0,0,0.9); line-height: 1; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    /* 🌟 1000人達成時の「ドクンドクン」中央拡大（メリハリ強化・0.8秒テンポ） */
    .celebrate-mode { 
      position: fixed !important; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(1.8) !important;
      font-size: 140px !important; color: #ffffff !important; 
      text-shadow: 0 0 25px rgba(212, 175, 55, 0.9), 0 0 50px rgba(212, 175, 55, 0.7), 0 0 80px rgba(212, 175, 55, 0.5) !important;
      z-index: 10000; animation: heartBeat 0.8s infinite cubic-bezier(0.25, 0.8, 0.25, 1) !important; 
    }
    .celebrate-container-mode {
      position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; margin: 0 !important; padding: 0 !important;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.45) !important; backdrop-filter: blur(20px) !important; -webkit-backdrop-filter: blur(20px) !important;
      border: none !important; box-shadow: 0 0 100px rgba(212, 175, 55, 0.6), inset 0 0 60px rgba(212, 175, 55, 0.3) !important;
      z-index: 9998;
    }
    @keyframes heartBeat {
      0% { transform: translate(-50%, -50%) scale(1.4); }
      15% { transform: translate(-50%, -50%) scale(1.65); }
      30% { transform: translate(-50%, -50%) scale(1.4); }
      45% { transform: translate(-50%, -50%) scale(1.55); }
      70% { transform: translate(-50%, -50%) scale(1.4); }
    }

    .container { display: flex; flex: 1; width: 100%; padding: 35px; gap: 30px; box-sizing: border-box; z-index: 10; }
    .card { flex: 1; background-color: var(--bg-glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 35px; padding: 40px 30px; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    .title-member, .title-visitor { font-size: 50px; font-weight: 900; color: #ffffff; text-shadow: 0 0 15px rgba(0, 118, 255, 0.8), 2px 2px 5px rgba(0,0,0,0.5); margin: 10px 0 20px 0; text-align: center; }
    .title-visitor { text-shadow: 0 0 15px rgba(16, 185, 129, 0.8), 2px 2px 5px rgba(0,0,0,0.5); }
    .counter-display { font-size: 150px; font-weight: 800; color: #ffffff; text-shadow: 2px 4px 15px rgba(0,0,0,0.7); font-variant-numeric: tabular-nums; margin: 0 0 10px 0; line-height: 1; }
    .footprint-zone { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; position: relative; z-index: 1; }
    .ripple-button { position: relative; width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%); box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6); border: 2px solid rgba(255, 255, 255, 0.5); transition: transform 0.05s; z-index: 3; cursor: pointer; }
    .btn-visitor-color { background: radial-gradient(circle, rgba(167, 243, 208, 0.95) 0%, rgba(16, 185, 129, 0.45) 70%, rgba(52, 211, 153, 0) 100%) !important; box-shadow: 0 0 35px rgba(16, 185, 129, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6) !important; }
    .ripple-effect { position: absolute; top: 50%; left: 50%; width: 220px; height: 220px; margin-top: -110px; margin-left: -110px; border-radius: 50%; border: 3px solid rgba(0, 225, 255, 0.85); background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, rgba(0, 225, 255, 0) 70%); pointer-events: none; z-index: 4; animation: rippleSpread 4.0s cubic-bezier(0.1, 0.2, 0.3, 1) forwards; }
    .ripple-visitor { border: 3px solid rgba(52, 211, 153, 0.85) !important; background: radial-gradient(circle, rgba(52, 211, 153, 0.1) 0%, rgba(52, 211, 153, 0) 70%) !important; }
    @keyframes rippleSpread { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2.6); opacity: 0; } }
    
    /* 🌸 散華専用コンテナと優雅な落下軌道アニメーション（統合軽量版） */
    .sange-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 99999; }
    .sange-petal-wrapper { position: absolute; top: -140px; }
    .sange-petal-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 6px 10px rgba(0,0,0,0.06)); opacity: 0.85; }
    
    /* 左右にダイナミックに揺れ、ゆったり裏返りつつ地面まで落ちる仏教アニメーション */
    @keyframes sangeMainAnimation {
      0% { transform: translateY(0) translateX(0) rotate(0deg) rotateY(0deg); opacity: 0; }
      10% { opacity: 0.9; }
      25% { transform: translateY(30vh) translateX(140px) rotate(40deg) rotateY(180deg); }
      50% { transform: translateY(60vh) translateX(-140px) rotate(-35deg) rotateY(360deg); }
      75% { transform: translateY(90vh) translateX(110px) rotate(30deg) rotateY(540deg); }
      90% { opacity: 0.9; }
      100% { transform: translateY(120vh) translateX(-70px) rotate(5deg) rotateY(720deg); opacity: 0; }
    }
    
    #status-message { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255, 255, 255, 0.5); z-index: 100; }
  </style>
</head>
<body>
  <div class="flash-overlay" id="flash-screen"></div>
  <div class="sange-container" id="sange-layer"></div>
  
  <div class="grand-total-container" id="grand-total-box">
    <div class="grand-total-title">Total Attendance</div>
    <div class="grand-total-display-wrapper">
      <div class="grand-total-number" id="grand-total">0</div>
    </div>
  </div>
  
  <div class="container">
    <div class="card">
      <h2 class="title-member">MEMBER</h2>
      <div class="counter-display" id="count-member">0</div>
      <div class="footprint-zone"><div class="ripple-button" onclick="handleCounterClick('member', this)"></div></div>
    </div>
    <div class="card">
      <h2 class="title-visitor">VISITOR</h2>
      <div class="counter-display" id="count-visitor">0</div>
      <div class="footprint-zone"><div class="ripple-button btn-visitor-color" onclick="handleCounterClick('visitor', this)"></div></div>
    </div>
  </div>

  <div id="status-message"></div>

  <script>
    const gasUrl = 'https://script.google.com/macros/s/AKfycbz2QnVhVNT25mUlzxOx-hMJXYGwavhNWqUTQ9Rvyy5GWs64BA4bHfHD7Q4iLCoY3hZP/exec'; // ⚠️ ここをGASのウェブアプリURLに書き換えてください
    let hasCelebrated = false; 

    function getTodayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function checkDateReset() {
      const todayStr = getTodayString();
      if (localStorage.getItem('last_saved_date') !== todayStr) {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('last_saved_date', todayStr);
        localStorage.setItem('sync_needed', 'true');
        hasCelebrated = false;
      }
    }

    function setupLongPress() {
      const target = document.getElementById('grand-total-box');
      let pressTimer;
      const startPress = (e) => { pressTimer = setTimeout(() => triggerResetAuth(), 800); };
      const cancelPress = (e) => { clearTimeout(pressTimer); };
      target.addEventListener('touchstart', startPress);
      target.addEventListener('touchend', cancelPress);
      target.addEventListener('mousedown', startPress);
      target.addEventListener('mouseup', cancelPress);
      target.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    function triggerResetAuth() {
      if (prompt("Please enter the reset password:") === "0425") {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('sync_needed', 'true');
        hasCelebrated = false;
        updateDisplay();
        sendDataToGAS();
        alert("Reset completed.");
      }
    }

    function performCelebrationEffect(totalEl, containerEl) {
      const flash = document.getElementById('flash-screen');
      flash.classList.add('flash-active');
      setTimeout(() => flash.classList.remove('flash-active'), 800);

      containerEl.classList.add('celebrate-container-mode');
      totalEl.classList.add('celebrate-mode');
      
      triggerSangeEffect(45);

      // ⏱️ 3秒間だけ拡大表示してしっとり自動で戻るよう調整
      setTimeout(() => {
        totalEl.classList.remove('celebrate-mode');
        containerEl.classList.remove('celebrate-container-mode');
      }, 3000); 
    }

    function updateDisplay() {
      checkDateReset();

      let m = parseInt(localStorage.getItem('today_member') || '0', 10);
      let v = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let grandTotal = m + v;

      document.getElementById('count-member').innerText = m;
      document.getElementById('count-visitor').innerText = v;
      
      const totalEl = document.getElementById('grand-total');
      const containerEl = document.getElementById('grand-total-box');
      totalEl.innerText = grandTotal.toLocaleString();

      // ⚠️ テスト用：10人達成で発動。本番時はここを 1000 に書き換えてください。
      const target = 10; 
      if (grandTotal >= target && !hasCelebrated) {
        performCelebrationEffect(totalEl, containerEl);
        hasCelebrated = true;
      }
    }

    function handleCounterClick(type, el) {
      checkDateReset();

      let m = parseInt(localStorage.getItem('today_member') || '0', 10);
      let v = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      if (type === 'member') m++; else v++;
      
      localStorage.setItem('today_member', m);
      localStorage.setItem('today_visitor', v);
      localStorage.setItem('sync_needed', 'true');
      
      updateDisplay();
      sendDataToGAS();
    }

    // 🌟 添付されたリアルな散華画像5パターンを文字化（SVG/Base64化）して直接コードに内蔵
    const sangeImages = [
      // 1. 桃色 (中央が明るく、外がじんわり色づく葉脈つき蓮弁)
      'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><defs><radialGradient id="g1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23fff" stop-opacity="0.95"/><stop offset="60%" stop-color="%23fff5f6" stop-opacity="0.8"/><stop offset="90%" stop-color="%23ffa6b4" stop-opacity="0.9"/><stop offset="100%" stop-color="%23ff788c" stop-opacity="1"/></radialGradient></defs><path d="M 50 2 C 85 10, 98 35, 50 58 C 2 35, 15 10, 50 2 Z" fill="url(%23g1)" stroke="%23fff" stroke-width="0.5"/><path d="M 50 2 Q 52 30, 50 58" fill="none" stroke="%23fff" stroke-width="0.4" stroke-dasharray="1,1.5"/><path d="M 30 15 Q 45 25, 50 35 M 70 15 Q 55 25, 50 35 M 22 28 Q 40 35, 50 45 M 78 28 Q 60 35, 50 45" fill="none" stroke="%23ffffff" stroke-width="0.25" stroke-opacity="0.6"/></svg>',
      // 2. 薄水色
      'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><defs><radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23fff" stop-opacity="0.95"/><stop offset="60%" stop-color="%23ebf5ff" stop-opacity="0.8"/><stop offset="90%" stop-color="%238cc8f5" stop-opacity="0.9"/><stop offset="100%" stop-color="%2364b4f0" stop-opacity="1"/></radialGradient></defs><path d="M 50 2 C 85 10, 98 35, 50 58 C 2 35, 15 10, 50 2 Z" fill="url(%23g2)" stroke="%23fff" stroke-width="0.5"/><path d="M 50 2 Q 52 30, 50 58" fill="none" stroke="%23fff" stroke-width="0.4" stroke-dasharray="1,1.5"/><path d="M 30 15 Q 45 25, 50 35 M 70 15 Q 55 25, 50 35 M 22 28 Q 40 35, 50 45 M 78 28 Q 60 35, 50 45" fill="none" stroke="%23ffffff" stroke-width="0.25" stroke-opacity="0.6"/></svg>',
      // 3. 若草色
      'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><defs><radialGradient id="g3" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23fff" stop-opacity="0.95"/><stop offset="60%" stop-color="%23f0ffeb" stop-opacity="0.8"/><stop offset="90%" stop-color="%23a5eb96" stop-opacity="0.9"/><stop offset="100%" stop-color="%2382d773" stop-opacity="1"/></radialGradient></defs><path d="M 50 2 C 85 10, 98 35, 50 58 C 2 35, 15 10, 50 2 Z" fill="url(%23g3)" stroke="%23fff" stroke-width="0.5"/><path d="M 50 2 Q 52 30, 50 58" fill="none" stroke="%23fff" stroke-width="0.4" stroke-dasharray="1,1.5"/><path d="M 30 15 Q 45 25, 50 35 M 70 15 Q 55 25, 50 35 M 22 28 Q 40 35, 50 45 M 78 28 Q 60 35, 50 45" fill="none" stroke="%23ffffff" stroke-width="0.25" stroke-opacity="0.6"/></svg>',
      // 4. 淡黄色
      'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><defs><radialGradient id="g4" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23fff" stop-opacity="0.95"/><stop offset="60%" stop-color="%23ffffe6" stop-opacity="0.8"/><stop offset="90%" stop-color="%23f5e68c" stop-opacity="0.9"/><stop offset="100%" stop-color="%23e1d264" stop-opacity="1"/></radialGradient></defs><path d="M 50 2 C 85 10, 98 35, 50 58 C 2 35, 15 10, 50 2 Z" fill="url(%23g4)" stroke="%23fff" stroke-width="0.5"/><path d="M 50 2 Q 52 30, 50 58" fill="none" stroke="%23fff" stroke-width="0.4" stroke-dasharray="1,1.5"/><path d="M 30 15 Q 45 25, 50 35 M 70 15 Q 55 25, 50 35 M 22 28 Q 40 35, 50 45 M 78 28 Q 60 35, 50 45" fill="none" stroke="%23ffffff" stroke-width="0.25" stroke-opacity="0.6"/></svg>',
      // 5. 藤色
      'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><defs><radialGradient id="g5" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="%23fff" stop-opacity="0.95"/><stop offset="60%" stop-color="%23faf0ff" stop-opacity="0.8"/><stop offset="90%" stop-color="%23c396f5" stop-opacity="0.9"/><stop offset="100%" stop-color="%23a06ee6" stop-opacity="1"/></radialGradient></defs><path d="M 50 2 C 85 10, 98 35, 50 58 C 2 35, 15 10, 50 2 Z" fill="url(%23g5)" stroke="%23fff" stroke-width="0.5"/><path d="M 50 2 Q 52 30, 50 58" fill="none" stroke="%23fff" stroke-width="0.4" stroke-dasharray="1,1.5"/><path d="M 30 15 Q 45 25, 50 35 M 70 15 Q 55 25, 50 35 M 22 28 Q 40 35, 50 45 M 78 28 Q 60 35, 50 45" fill="none" stroke="%23ffffff" stroke-width="0.25" stroke-opacity="0.6"/></svg>'
    ];

    function triggerSangeEffect(count = 30) {
      const layer = document.getElementById('sange-layer');

      for(let i=0; i<count; i++) {
        const petalWrapper = document.createElement('div');
        petalWrapper.className = 'sange-petal-wrapper';
        
        // iPadの画面上で幅約4センチ相当（140px〜175px）のボタニカルアートサイズ
        const size = (140 + Math.random() * 35); 
        
        petalWrapper.style.left = (Math.random() * 110 - 5) + '%';
        
        // 1つのタイムラインに落下の動きを集約。衝突を回避して滑らかに底まで落とす
        petalWrapper.style.animation = 'sangeMainAnimation ' + (8 + Math.random() * 5) + 's linear forwards';
        petalWrapper.style.animationDelay = (Math.random() * 4.5) + 's';
        petalWrapper.style.width = size + 'px';
        petalWrapper.style.height = (size * 0.6) + 'px'; 

        // ランダムで画像を選択してimgタグとして生成
        const randomImageSrc = sangeImages[Math.floor(Math.random() * sangeImages.length)];
        petalWrapper.innerHTML = `<img src="${randomImageSrc}" class="sange-petal-img" />`;
        
        layer.appendChild(petalWrapper);
        
        // 落ちきったら自動消去（メモリ対策）
        setTimeout(() => petalWrapper.remove(), 13500);
      }
    }

    function sendDataToGAS() {
      if (localStorage.getItem('sync_needed') !== 'true') return;
      const m = localStorage.getItem('today_member') || '0';
      const v = localStorage.getItem('today_visitor') || '0';
      const dateStr = localStorage.getItem('last_saved_date') || getTodayString();
      const statusEl = document.getElementById('status-message');

      statusEl.innerText = "Syncing...";

      fetch(gasUrl, {
        method: 'POST',
        body: JSON.stringify({ date: dateStr, memberToday: m, visitorToday: v })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") {
          localStorage.removeItem('sync_needed');
          statusEl.innerText = "Synced successfully";
          setTimeout(() => { if(statusEl.innerText === "Synced successfully") statusEl.innerText = ""; }, 3000);
        } else {
          statusEl.innerText = "Sync error (Server)";
        }
      })
      .catch(error => {
        statusEl.innerText = "Offline - Saved locally";
      });
    }

    window.onload = () => { 
      updateDisplay(); 
      setupLongPress(); 
      sendDataToGAS(); 
    };
  </script>
</body>
</html>
