<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COUNTER">

  <title>Attendance Counter</title>
  <style>
    :root {
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 🌟 中央上部：Total Attendance (蓮の絵なし) */
    .grand-total-container {
      background: rgba(30, 25, 20, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      padding: 12px 60px;
      margin-top: 30px;
      margin-bottom: -10px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05);
      z-index: 50;
      animation: pulseGlow 3s infinite alternate;
      cursor: pointer;
      transition: opacity 0.3s ease;
      
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05); }
      100% { box-shadow: 0 12px 40px rgba(212, 175, 55, 0.4), inset 0 0 25px rgba(212, 175, 55, 0.15); }
    }

    .grand-total-title {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      text-shadow: 
        0 0 4px rgba(212, 175, 55, 0.9), 
        0 0 10px rgba(212, 175, 55, 0.8), 
        1px 2px 3px rgba(0,0,0,0.8);
      margin: 0;
      pointer-events: none;
    }

    .grand-total-display-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      pointer-events: none;
    }

    .grand-total-number {
      font-size: 48px;
      font-weight: 800;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.4), 2px 3px 8px rgba(0,0,0,0.9);
      line-height: 1;
    }

    /* 📦 メインコンテナ */
    .container {
      display: flex;
      flex: 1;
      width: 100%;
      padding: 35px;
      gap: 30px;
      box-sizing: border-box;
      z-index: 10;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 35px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .title-member {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(0, 118, 255, 0.8), 2px 2px 5px rgba(0,0,0,0.5);
      margin: 10px 0 20px 0;
      text-align: center;
      z-index: 6;
      letter-spacing: 1px;
    }

    .title-visitor {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(16, 185, 129, 0.8), 2px 2px 5px rgba(0,0,0,0.5);
      margin: 10px 0 20px 0;
      text-align: center;
      z-index: 6;
      letter-spacing: 1px;
    }

    .counter-display {
      font-size: 150px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 0 0 10px 0;
      z-index: 6;
      line-height: 1;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .ripple-button {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.05s;
      z-index: 3;
      cursor: pointer;
    }

    .btn-visitor-color {
      background: radial-gradient(circle, rgba(167, 243, 208, 0.95) 0%, rgba(16, 185, 129, 0.45) 70%, rgba(52, 211, 153, 0) 100%) !important;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6) !important;
    }

    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      margin-top: -110px;
      margin-left: -110px;
      border-radius: 50%;
      border: 3px solid rgba(0, 225, 255, 0.85);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none;
      z-index: 4;
      animation: rippleSpread 4.0s cubic-bezier(0.1, 0.2, 0.3, 1) forwards;
    }

    .ripple-visitor {
      border: 3px solid rgba(52, 211, 153, 0.85) !important;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.1) 0%, rgba(52, 211, 153, 0) 70%) !important;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 5px; }
      20% { opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; border-width: 0.5px; }
    }

    .ripple-button:active {
      transform: scale(0.92);
    }

    .walking-step {
      position: absolute;
      width: 350px;
      height: 350px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    #status-message {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      height: 15px;
      z-index: 100;
      pointer-events: none;
    }

    @keyframes walkUpLeft {
      0% { transform: translateY(300px) translateX(-60px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-150px) translateX(-60px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-220px) translateX(-60px) rotate(-10deg); opacity: 0; }
    }

    @keyframes walkUpRight {
      0% { transform: translateY(160px) translateX(60px) rotate(10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-280px) translateX(60px) rotate(10deg); opacity: 0.75; }
      100% { transform: translateY(-350px) translateX(60px) rotate(10deg); opacity: 0; }
    }

    @keyframes walkUpFinal {
      0% { transform: translateY(20px) translateX(-40px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-420px) translateX(-40px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-500px) translateX(-40px) rotate(-10deg) scale(0.85); opacity: 0; }
    }

    /* 🌸 散華（Sange）エフェクト用レイヤー */
    .sange-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      pointer-events: none;
      z-index: 999;
      perspective: 1200px;
    }

    .sange-petal-wrapper {
      position: absolute;
      top: -160px;
      width: 150px; /* 約4cm相当 */
      height: 150px;
      pointer-events: none;
      animation: sangeFallLinear linear forwards;
    }

    .sange-petal {
      width: 100%;
      height: 100%;
      fill-opacity: 0.85;
      filter: drop-shadow(0 8px 15px rgba(0,0,0,0.15));
      transform-origin: center;
    }

    @keyframes sangeFallLinear {
      0% { transform: translateY(0); opacity: 0; }
      12% { opacity: 1; }
      88% { opacity: 1; }
      100% { transform: translateY(120vh); opacity: 0; }
    }

    @keyframes sangeSwayLeft {
      0% { transform: translateX(0) rotateY(0deg) rotateZ(0deg); }
      25% { transform: translateX(-110px) rotateY(60deg) rotateZ(25deg); }
      50% { transform: translateX(0) rotateY(120deg) rotateZ(0deg); }
      75% { transform: translateX(110px) rotateY(60deg) rotateZ(-25deg); }
      100% { transform: translateX(0) rotateY(0deg) rotateZ(0deg); }
    }

    @keyframes sangeSwayRight {
      0% { transform: translateX(0) rotateY(0deg) rotateZ(0deg); }
      25% { transform: translateX(110px) rotateY(-60deg) rotateZ(-25deg); }
      50% { transform: translateX(0) rotateY(-120deg) rotateZ(0deg); }
      75% { transform: translateX(-110px) rotateY(-60deg) rotateZ(25deg); }
      100% { transform: translateX(0) rotateY(0deg) rotateZ(0deg); }
    }

    /* 👑 1000人(テスト10人)達成：全画面フラッシュ＆特大パルス演出 */
    #celebration-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(255, 255, 255, 0);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    .flash-aura-active {
      animation: flashAuraAnim 2.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes flashAuraAnim {
      0% { 
        background-color: rgba(255, 255, 255, 1); 
        box-shadow: inset 0 0 0px rgba(212, 175, 55, 0);
      }
      15% { 
        background-color: rgba(255, 255, 255, 0.15); 
        box-shadow: inset 0 0 180px rgba(212, 175, 55, 0.7), 0 0 120px rgba(212, 175, 55, 0.4);
      }
      100% { 
        background-color: rgba(255, 255, 255, 0); 
        box-shadow: inset 0 0 0px rgba(212, 175, 55, 0);
      }
    }

    /* 白文字、金色の華やかなぼかし枠（数字のみを美しく魅せる） */
    #celebration-number {
      font-size: 190px;
      font-weight: 800;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-shadow: 
        0 0 20px rgba(212, 175, 55, 1), 
        0 0 40px rgba(212, 175, 55, 0.85), 
        0 0 75px rgba(212, 175, 55, 0.6);
      opacity: 0;
    }

    .pulse-heart-active {
      animation: heartBeat2SecAnim 2.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* 2秒間で綺麗に2回、心臓のようにドクン・ドクンと波打つ完全同期パルス */
    @keyframes heartBeat2SecAnim {
      0% { transform: scale(0.5); opacity: 0; }
      15% { transform: scale(1.5); opacity: 1; }   /* 1回目のドクン（最大化） */
      32% { transform: scale(0.95); }              /* 収縮 */
      50% { transform: scale(1.4); }               /* 2回目のドクン（中最大化） */
      68% { transform: scale(1.0); opacity: 1; }   /* 安定 */
      85% { transform: scale(1.0); opacity: 1; }   /* 余韻をキープ */
      100% { transform: scale(0.5); opacity: 0; }  /* 収縮しながら美しく消滅 */
    }
  </style>
</head>
<body>

  <svg style="width:0; height:0; position:absolute;">
    <defs>
      <radialGradient id="sange-pink" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="72%" stop-color="#fff2f6"/>
        <stop offset="100%" stop-color="#fba3c8"/>
      </radialGradient>
      <radialGradient id="sange-blue" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="72%" stop-color="#f2faff"/>
        <stop offset="100%" stop-color="#add8e6"/>
      </radialGradient>
      <radialGradient id="sange-green" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="72%" stop-color="#f6fff9"/>
        <stop offset="100%" stop-color="#b4dcad"/>
      </radialGradient>
      <radialGradient id="sange-yellow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="72%" stop-color="#fffffa"/>
        <stop offset="100%" stop-color="#fcefa6"/>
      </radialGradient>
      <radialGradient id="sange-purple" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="72%" stop-color="#faf7ff"/>
        <stop offset="100%" stop-color="#d1c2f0"/>
      </radialGradient>
    </defs>
  </svg>

  <div class="sange-container" id="sange-layer"></div>

  <div id="celebration-overlay">
    <span id="celebration-number">0</span>
  </div>

  <div class="grand-total-container" id="grand-total-box">
    <div class="grand-total-title">Total Attendance</div>
    <div class="grand-total-display-wrapper">
      <div class="grand-total-number" id="grand-total">0</div>
    </div>
  </div>
  
  <div class="container">
    <div class="card">
      <h2 class="title-member">MEMBER</h2>
      <div class="counter-display" id="count-member">0</div>
      <div class="footprint-zone">
        <div class="ripple-button" onclick="handleCounterClick('member', this)"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="title-visitor">VISITOR</h2>
      <div class="counter-display" id="count-visitor">0</div>
      <div class="footprint-zone">
        <div class="ripple-button btn-visitor-color" onclick="handleCounterClick('visitor', this)"></div>
      </div>
    </div>
  </div>

  <div id="status-message"></div>

  <script>
    const gasUrl = 'https://script.google.com/macros/s/AKfycbz2QnVhVNT25mUlzxOx-hMJXYGwavhNWqUTQ9Rvyy5GWs64BA4bHfHD7Q4iLCoY3hZP/exec';

    let isSending = false;

    window.addEventListener('DOMContentLoaded', () => {
      updateDisplay();
      setupLongPress(); 
      window.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { passive: false });
      processQueue();
    });

    function getFixedTodayString() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function setupLongPress() {
      const target = document.getElementById('grand-total-box');
      let pressTimer;

      const startPress = (e) => {
        if (e.cancelable) e.preventDefault();
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => {
          triggerResetAuth();
        }, 2500);
      };

      const cancelPress = (e) => {
        clearTimeout(pressTimer);
      };

      target.addEventListener('touchstart', startPress, { passive: false });
      target.addEventListener('touchend', cancelPress, { passive: false });
      target.addEventListener('touchmove', cancelPress, { passive: false });
      
      target.addEventListener('mousedown', startPress);
      target.addEventListener('mouseup', cancelPress);
      target.addEventListener('mouseleave', cancelPress);
    }

    function triggerResetAuth() {
      const password = prompt("Please enter the reset password:");
      
      if (password === "0425") {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('total_member', '0');
        localStorage.setItem('total_visitor', '0');
        localStorage.removeItem('gas_request_queue'); 
        localStorage.removeItem('last_celebrated_total'); // 演出履歴もリセット
        
        document.getElementById('grand-total-box').style.opacity = '1';
        
        updateDisplay();
        alert("All counters and queues have been successfully reset to 0.");
      } else if (password !== null) {
        alert("Incorrect password. Reset canceled.");
      }
    }

    function getOrCreateDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'ipad_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    function checkDateReset() {
      const todayStr = getFixedTodayString();
      const savedDate = localStorage.getItem('lastSavedDate');

      if (savedDate !== todayStr) {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('lastSavedDate', todayStr);
      }
    }

    function updateDisplay() {
      checkDateReset();
      
      let tMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let tVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalM = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalV = parseInt(localStorage.getItem('total_visitor') || '0', 10);

      let grandTotal = totalM + totalV;

      document.getElementById('count-member').innerText = tMember;
      document.getElementById('count-visitor').innerText = tVisitor;
      document.getElementById('grand-total').innerText = grandTotal.toLocaleString();

      /* 🌟 到達判定ロジック 🌟
         ・【テスト用】現在は 10の倍数（10, 20, 30...）ごとに何度でも発火します。
         ・【本番用】千単位にする場合は、下の行の「% 10」を「% 1000」に書き換えてください。
      */
      const targetUnit = 10; // 👈 本番時はここを 1000 に書き換えてください
      
      if (grandTotal > 0 && grandTotal % targetUnit === 0) {
        // 同じ数字で何度も大演出が重複発火するのを防ぐガード処理
        if (localStorage.getItem('last_celebrated_total') !== String(grandTotal)) {
          triggerCelebration(grandTotal);
          localStorage.setItem('last_celebrated_total', String(grandTotal));
        }
      }
    }

    // 👑 達成時の大演出アニメーション
    function triggerCelebration(currentTotal) {
      // 1. 上部の通常メーター表示を2秒間隠す
      const grandTotalBox = document.getElementById('grand-total-box');
      grandTotalBox.style.opacity = '0';

      // 2. 演出用オーバーレイに「数字だけ」を設定
      document.getElementById('celebration-number').innerText = currentTotal;
      const overlay = document.getElementById('celebration-overlay');
      const numberSpan = document.getElementById('celebration-number');

      overlay.style.display = 'flex';
      overlay.classList.add('flash-aura-active');
      numberSpan.classList.add('pulse-heart-active');

      // 3. 2秒後に中央の数字表示を片付け、上部通常メーターを復帰
      setTimeout(() => {
        overlay.style.display = 'none';
        overlay.classList.remove('flash-aura-active');
        numberSpan.classList.remove('pulse-heart-active');
        grandTotalBox.style.opacity = '1';
      }, 2000);

      // 4. 仏教的な散華エフェクトを実行（5枚、数字消去後も下まで落ち続ける）
      const sangeLayer = document.getElementById('sange-layer');
      const colors = ['pink', 'blue', 'green', 'yellow', 'purple'];
      const basePositions = [12, 31, 50, 69, 88]; // 横幅の初期配置

      for (let i = 0; i < 5; i++) {
        const color = colors[i];
        
        const wrapper = document.createElement('div');
        wrapper.className = 'sange-petal-wrapper';

        const svgNS = "http://www.w3.org/2000/svg";
        const svgPetal = document.createElementNS(svgNS, "svg");
        svgPetal.setAttribute("class", "sange-petal");
        svgPetal.setAttribute("viewBox", "0 0 50 50");
        svgPetal.setAttribute("fill", `url(#sange-${color})`);

        svgPetal.innerHTML = `
          <path d="M 25,45 C 5,35 5,15 25,5 C 45,15 45,35 25,45 Z" />
          <path d="M 25,45 C 12,38 12,22 25,12 C 38,22 38,38 25,45 Z" fill="rgba(255,255,255,0.65)" />
          <path d="M 25,43 L 25,7" stroke="rgba(255,255,255,0.5)" stroke-width="0.4" />
          <path d="M 25,35 C 21,31 19,26 16,23" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3" />
          <path d="M 25,35 C 29,31 31,26 34,23" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3" />
          <path d="M 25,27 C 20,24 18,20 15,17" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3" />
          <path d="M 25,27 C 30,24 32,20 35,17" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3" />
          <path d="M 25,19 C 21,17 19,14 17,11" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3" />
          <path d="M 25,19 C 29,17 31,14 33,11" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.3" />
        `;
        
        wrapper.appendChild(svgPetal);

        const jitter = (Math.random() * 6) - 3;
        wrapper.style.left = `${basePositions[i] + jitter}%`;

        const animationDelay = Math.random() * 0.8;
        const fallDuration = 8.0 + Math.random() * 3.0; 
        const swayDuration = 3.6 + Math.random() * 1.4;

        wrapper.style.animationDelay = `${animationDelay}s`;
        wrapper.style.animationDuration = `${fallDuration}s`;

        const swayType = i % 2 === 0 ? 'sangeSwayLeft' : 'sangeSwayRight';
        svgPetal.style.animation = `${swayType} ${swayDuration}s ease-in-out infinite`;

        sangeLayer.appendChild(wrapper);

        setTimeout(() => {
          wrapper.remove();
        }, (animationDelay + fallDuration) * 1000);
      }
    }

    function handleCounterClick(type, circleElement) {
      checkDateReset();

      let todayMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let todayVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalMember = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalVisitor = parseInt(localStorage.getItem('total_visitor') || '0', 10);

      if (type === 'member') {
        todayMember++;
        totalMember++;
      } else {
        todayVisitor++;
        totalVisitor++;
      }

      localStorage.setItem('today_member', todayMember.toString());
      localStorage.setItem('today_visitor', todayVisitor.toString());
      localStorage.setItem('total_member', totalMember.toString());
      localStorage.setItem('total_visitor', totalVisitor.toString());

      updateDisplay();

      createTripleRipple(circleElement, type);
      const zone = circleElement.parentElement;
      spawnFootprints(zone);

      const payload = {
        type: "click_counter",
        date: localStorage.getItem('lastSavedDate'),
        memberToday: todayMember,
        visitorToday: todayVisitor,
        totalToday: todayMember + todayVisitor,
        deviceId: getOrCreateDeviceId()
      };

      let queue = JSON.parse(localStorage.getItem('gas_request_queue') || '[]');
      queue.push(payload);
      localStorage.setItem('gas_request_queue', JSON.stringify(queue));

      processQueue();
    }

    function createTripleRipple(button, type) {
      const delays = [0, 700, 1400];
      delays.forEach(delay => {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          if (type === 'visitor') {
            ripple.classList.add('ripple-visitor');
          }
          button.appendChild(ripple);
          setTimeout(() => ripple.remove(), 4000);
        }, delay);
      });
    }

    function spawnFootprints(zone) {
      const animations = ['walkUpLeft', 'walkUpRight', 'walkUpFinal'];
      const svgs = [leftFootSVG, rightFootSVG, leftFootSVG];
      const delays = [0, 650, 1300];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 2400);
        }, delays[index]);
      });
    }

    const leftFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(20, 20, 20, 0.75); filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.4));"><path d="M52,85 C45,85 42,75 44,62 C46,52 38,44 40,34 C42,26 52,25 56,32 C60,39 56,48 58,58 C60,68 60,85 52,85 Z"/><circle cx="61" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="41" cy="19" r="4"/><circle cx="33" cy="24" r="3.5"/><circle cx="27" cy="31" r="3"/></svg>`;
    const rightFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(20, 20, 20, 0.75); filter: drop-shadow(1px 2px 5px rgba(0,0,0,0.4));"><path d="M48,85 C55,85 58,75 56,62 C54,52 62,44 60,34 C58,26 48,25 44,32 C40,39 44,48 42,58 C40,68 40,85 48,85 Z"/><circle cx="39" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="59" cy="19" r="4"/><circle cx="67" cy="24" r="3.5"/><circle cx="73" cy="31" r="3"/></svg>`;

    function processQueue() {
      let queue = JSON.parse(localStorage.getItem('gas_request_queue') || '[]');
      if (isSending || queue.length === 0) return;

      isSending = true;
      document.getElementById('status-message').innerText = "Syncing... (" + queue.length + ")";

      const currentPayload = queue[0];

      fetch(gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(currentPayload)
      })
      .then(res => {
        queue.shift();
        localStorage.setItem('gas_request_queue', JSON.stringify(queue));
      })
      .catch(err => {
        console.error("Transmission failed (Offline):", err);
      })
      .finally(() => {
        isSending = false;
        let nextQueue = JSON.parse(localStorage.getItem('gas_request_queue') || '[]');
        if (nextQueue.length === 0) {
          document.getElementById('status-message').innerText = "";
        } else {
          document.getElementById('status-message').innerText = "Syncing... (" + nextQueue.length + ")";
        }
        setTimeout(processQueue, 500);
      });
    }
  </script>
</body>
</html>
