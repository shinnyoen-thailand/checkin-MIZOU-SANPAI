<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter System</title>
    <style>
        /* 🌍 全体を画面中央に配置 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            font-family: sans-serif;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
        }

        /* 📦 メインコンテナ */
        #counter-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #777;
            margin-bottom: 25px;
        }

        /* 📊 カウント表示エリア */
        .counter-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .label-group {
            text-align: left;
        }

        .type-label {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .total-label {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }

        .count-display {
            font-size: 38px;
            font-weight: bold;
            color: #0076ff;
        }

        /* 🛑 ボタンエリア */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .count-btn {
            flex: 1;
            padding: 25px 20px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-member {
            background-color: #0076ff;
        }
        .btn-member:active { transform: scale(0.92); background-color: #005ecb; }

        .btn-visitor {
            background-color: #10b981;
        }
        .btn-visitor:active { transform: scale(0.92); background-color: #059669; }

        /* 📡 同期中ステータス表示 */
        #status-message {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            height: 15px;
        }
    </style>
</head>
<body>

    <div id="counter-container">
        <div class="section-title">Attendance Counter</div>

        <div class="counter-box">
            <div class="label-group">
                <div class="type-label">Member</div>
                <div class="total-label">Total: <span id="total-member">0</span></div>
            </div>
            <div class="count-display" id="today-member">0</div>
        </div>

        <div class="counter-box">
            <div class="label-group">
                <div class="type-label">Visitor</div>
                <div class="total-label">Total: <span id="total-visitor">0</span></div>
            </div>
            <div class="count-display" id="today-visitor">0</div>
        </div>

        <div class="btn-group">
            <button class="count-btn btn-member" id="btn-member" onclick="addCount('member')">＋ Member</button>
            <button class="count-btn btn-visitor" id="btn-visitor" onclick="addCount('visitor')">＋ Visitor</button>
        </div>

        <div id="status-message"></div>
    </div>

    <script>
        // 🔗 GAS Web App URL (取得したGASのURLをここに貼り付けてください)
        const gasUrl = 'https://script.google.com/macros/s/AKfycbyBnDj17Ni5-UkB0xK3CQrAk7DNBgY2Nm6bJ207lQ1TXnowDPjF6TujSLKa1aqjBvsD/exec';

        // 送信待ちデータを貯めるキュー（配列）と送信中フラグ
        let requestQueue = [];
        let isSending = false;

        function getOrCreateDeviceId() {
            let id = localStorage.getItem('deviceId');
            if (!id) {
                id = 'ipad_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('deviceId', id);
            }
            return id;
        }

        // 日付が変わったら当日カウントを自動リセット
        function checkDateReset() {
            const todayStr = new Date().toLocaleDateString('ja-JP');
            const savedDate = localStorage.getItem('lastSavedDate');

            if (savedDate !== todayStr) {
                localStorage.setItem('today_member', '0');
                localStorage.setItem('today_visitor', '0');
                localStorage.setItem('lastSavedDate', todayStr);
            }
        }

        function updateDisplay() {
            checkDateReset();
            document.getElementById('today-member').innerText = localStorage.getItem('today_member') || '0';
            document.getElementById('today-visitor').innerText = localStorage.getItem('today_visitor') || '0';
            document.getElementById('total-member').innerText = localStorage.getItem('total_member') || '0';
            document.getElementById('total-visitor').innerText = localStorage.getItem('total_visitor') || '0';
        }

        // 🚀 カウントアップ処理（待ち時間ゼロ・即時画面反映）
        function addCount(type) {
            checkDateReset();

            // 1. 画面の数字とローカルデータを「即座に」プラス（ボタンは一切固まりません）
            let todayMember = parseInt(localStorage.getItem('today_member') || '0', 10);
            let todayVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
            let totalMember = parseInt(localStorage.getItem('total_member') || '0', 10);
            let totalVisitor = parseInt(localStorage.getItem('total_visitor') || '0', 10);

            if (type === 'member') {
                todayMember++;
                totalMember++;
            } else if (type === 'visitor') {
                todayVisitor++;
                totalVisitor++;
            }

            localStorage.setItem('today_member', todayMember.toString());
            localStorage.setItem('today_visitor', todayVisitor.toString());
            localStorage.setItem('total_member', totalMember.toString());
            localStorage.setItem('total_visitor', totalVisitor.toString());

            // 画面を即時書き換え
            document.getElementById('today-member').innerText = todayMember;
            document.getElementById('today-visitor').innerText = todayVisitor;
            document.getElementById('total-member').innerText = totalMember;
            document.getElementById('total-visitor').innerText = totalVisitor;

            // 2. 送信データを確定させて「送信待ち行列（キュー）」に追加
            const payload = {
                type: "click_counter",
                date: localStorage.getItem('lastSavedDate'),
                memberToday: todayMember,
                visitorToday: todayVisitor,
                totalToday: todayMember + todayVisitor,
                deviceId: getOrCreateDeviceId()
            };
            requestQueue.push(payload);

            // 3. バックグラウンドで送信処理を動かす
            processQueue();
        }

        // 🔄 送信待ち行列を裏側で順番に処理する関数
        function processQueue() {
            if (isSending || requestQueue.length === 0) return;

            isSending = true;
            document.getElementById('status-message').innerText = "Updating spreadsheet... (" + requestQueue.length + " pending)";

            const currentPayload = requestQueue[0];

            fetch(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(currentPayload)
            })
            .then(res => {
                // 送信に成功したら、行列の先頭を削除して次へ
                requestQueue.shift();
            })
            .catch(err => {
                console.error("Transmission failed, retrying later:", err);
            })
            .finally(() => {
                isSending = false;
                if (requestQueue.length === 0) {
                    document.getElementById('status-message').innerText = "";
                }
                // 次のデータを自動送信
                setTimeout(processQueue, 100); 
            });
        }

        window.onload = function() {
            updateDisplay();
        };
    </script>
</body>
</html>
