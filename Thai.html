<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COUNTER">
  <title>Attendance Counter</title>
  <style>
    :root {
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 🌟 画面全体フラッシュ・オーラ効果 */
    .flash-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle, rgba(255,223,128,0.8) 0%, rgba(255,255,255,0.9) 30%, rgba(255,255,255,0) 70%);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .flash-active { opacity: 1; }

    /* 中央上部：Total Attendance */
    .grand-total-container {
      background: rgba(30, 25, 20, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      padding: 12px 45px;
      margin-top: 30px;
      margin-bottom: -10px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05);
      z-index: 50;
      animation: pulseGlow 3s infinite alternate;
      cursor: pointer;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 12px 35px rgba(0,0,0,0.45), inset 0 0 20px rgba(255,255,255,0.05); }
      100% { box-shadow: 0 12px 40px rgba(212, 175, 55, 0.4), inset 0 0 25px rgba(212, 175, 55, 0.15); }
    }

    .grand-total-title {
      font-size: 18px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      text-shadow: 0 0 4px rgba(212, 175, 55, 0.9), 1px 2px 3px rgba(0,0,0,0.8);
      margin: 0;
      pointer-events: none;
    }

    .grand-total-display-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      pointer-events: none;
    }

    .grand-total-number {
      font-size: 48px;
      font-weight: 800;
      color: #ffffff;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.4), 2px 3px 8px rgba(0,0,0,0.9);
      line-height: 1;
      transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* 🌟 神聖な達成時巨大化パルスアニメーション (白文字＋金のぼかしオーラ) */
    .celebrate-mode {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) !important;
      font-size: 220px !important;
      font-weight: 900;
      color: #ffffff !important;
      /* 金色の強い光彩ぼかしをレイヤー状に重ねてオーラを表現 */
      text-shadow: 
        0 0 20px rgba(255, 215, 0, 0.9), 
        0 0 40px rgba(255, 215, 0, 0.7), 
        0 0 70px rgba(255, 165, 0, 0.5), 
        0 0 100px rgba(255, 255, 255, 0.5),
        2px 5px 20px rgba(0,0,0,0.6) !important;
      z-index: 10000;
      animation: heartBeatPulse 1.2s infinite alternate cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    @keyframes heartBeatPulse {
      0% { transform: translate(-50%, -50%) scale(0.95); }
      30% { transform: translate(-50%, -50%) scale(1.08); }
      60% { transform: translate(-50%, -50%) scale(0.98); }
      100% { transform: translate(-50%, -50%) scale(1.05); }
    }

    /* 📦 メインコンテナ */
    .container {
      display: flex;
      flex: 1;
      width: 100%;
      padding: 35px;
      gap: 30px;
      box-sizing: border-box;
      z-index: 10;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 35px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .title-member {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(0, 118, 255, 0.8), 2px 2px 5px rgba(0,0,0,0.5);
      margin: 10px 0 20px 0;
      text-align: center;
      z-index: 6;
      letter-spacing: 1px;
    }

    .title-visitor {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(16, 185, 129, 0.8), 2px 2px 5px rgba(0,0,0,0.5);
      margin: 10px 0 20px 0;
      text-align: center;
      z-index: 6;
      letter-spacing: 1px;
    }

    .counter-display {
      font-size: 150px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 0 0 10px 0;
      z-index: 6;
      line-height: 1;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .ripple-button {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.05s;
      z-index: 3;
      cursor: pointer;
    }

    .btn-visitor-color {
      background: radial-gradient(circle, rgba(167, 243, 208, 0.95) 0%, rgba(16, 185, 129, 0.45) 70%, rgba(52, 211, 153, 0) 100%) !important;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6) !important;
    }

    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      margin-top: -110px;
      margin-left: -110px;
      border-radius: 50%;
      border: 3px solid rgba(0, 225, 255, 0.85);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none;
      z-index: 4;
      animation: rippleSpread 4.0s cubic-bezier(0.1, 0.2, 0.3, 1) forwards;
    }

    .ripple-visitor {
      border: 3px solid rgba(52, 211, 153, 0.85) !important;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.1) 0%, rgba(52, 211, 153, 0) 70%) !important;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 5px; }
      20% { opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; border-width: 0.5px; }
    }

    .ripple-button:active { transform: scale(0.92); }
    
    #status-message {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      height: 15px;
      z-index: 100;
      pointer-events: none;
    }

    /* 🌸 仏教的散華（Sange）エフェクト用スタイル */
    .sange-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 9998;
      perspective: 1000px;
    }

    .sange-petal-wrapper {
      position: absolute;
      top: -100px;
      pointer-events: none;
      animation: sangeFallLinear linear forwards;
    }

    .sange-petal {
      width: 100%;
      height: 100%;
      transform-origin: center;
    }

    @keyframes sangeFallLinear {
      0% { transform: translateY(0); opacity: 0; }
      8% { opacity: 1; }
      92% { opacity: 1; }
      100% { transform: translateY(115vh); opacity: 0; }
    }

    /* 優雅な大きくゆったりとした回転・ひらひら軌道 */
    @keyframes sangeSwayLeft {
      0% { transform: translateX(0) rotateY(0deg) rotateZ(0deg); }
      25% { transform: translateX(-80px) rotateY(70deg) rotateZ(45deg); }
      50% { transform: translateX(0) rotateY(180deg) rotateZ(90deg); }
      75% { transform: translateX(80px) rotateY(70deg) rotateZ(135deg); }
      100% { transform: translateX(0) rotateY(360deg) rotateZ(180deg); }
    }

    @keyframes sangeSwayRight {
      0% { transform: translateX(0) rotateY(0deg) rotateZ(0deg); }
      25% { transform: translateX(80px) rotateY(-70deg) rotateZ(-45deg); }
      50% { transform: translateX(0) rotateY(-180deg) rotateZ(-90deg); }
      75% { transform: translateX(-80px) rotateY(-70deg) rotateZ(-135deg); }
      100% { transform: translateX(0) rotateY(-360deg) rotateZ(-180deg); }
    }
  </style>
</head>
<body>

  <svg style="width:0; height:0; position:absolute;">
    <defs>
      <linearGradient id="sange-pink" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#fff0f5" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#ffb6c1" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ff69b4" stop-opacity="0.8"/>
      </linearGradient>
      <linearGradient id="sange-blue" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#f0f8ff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#b0c4de" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#4682b4" stop-opacity="0.8"/>
      </linearGradient>
      <linearGradient id="sange-green" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#f5fffa" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#98fb98" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#3cb371" stop-opacity="0.8"/>
      </linearGradient>
      <linearGradient id="sange-yellow" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#fffff0" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#fafad2" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ffd700" stop-opacity="0.8"/>
      </linearGradient>
      <linearGradient id="sange-purple" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#f8f4ff" stop-opacity="0.2"/>
        <stop offset="75%" stop-color="#e6e6fa" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#9370db" stop-opacity="0.8"/>
      </linearGradient>

      <g id="sange-petal-shape">
        <path d="M 25,48 C -2,35 -2,12 25,2 C 52,12 52,35 25,48 Z" />
        <path d="M 25,46 C 4,33 4,14 25,6 C 46,14 46,33 25,46 Z" fill="#ffffff" fill-opacity="0.3" />
        <path d="M 25,45 L 25,4" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.7" />
        <path d="M 25,36 C 18,30 14,24 10,20 M 25,36 C 32,30 36,24 40,20" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.5" />
        <path d="M 25,26 C 16,21 12,16 9,12 M 25,26 C 34,21 38,16 41,12" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.5" />
      </g>
    </defs>
  </svg>

  <div class="flash-overlay" id="flash-bg"></div>
  <div class="sange-container" id="sange-layer"></div>

  <div class="grand-total-container" id="grand-total-box">
    <div class="grand-total-title">Total Attendance</div>
    <div class="grand-total-display-wrapper">
      <div class="grand-total-number" id="grand-total">0</div>
    </div>
  </div>
  
  <div class="container">
    <div class="card">
      <h2 class="title-member">MEMBER</h2>
      <div class="counter-display" id="count-member">0</div>
      <div class="footprint-zone">
        <div class="ripple-button" onclick="handleCounterClick('member', this)"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="title-visitor">VISITOR</h2>
      <div class="counter-display" id="count-visitor">0</div>
      <div class="footprint-zone">
        <div class="ripple-button btn-visitor-color" onclick="handleCounterClick('visitor', this)"></div>
      </div>
    </div>
  </div>

  <div id="status-message"></div>

  <script>
    const gasUrl = 'https://script.google.com/macros/s/AKfycbz2QnVhVNT25mUlzxOx-hMJXYGwavhNWqUTQ9Rvyy5GWs64BA4bHfHD7Q4iLCoY3hZP/exec'; // ⚠️ ご自身のGASウェブアプリURLに書き換えてください

    let requestQueue = [];
    let isSending = false;
    let hasCelebrated = false; 

    window.addEventListener('DOMContentLoaded', () => {
      updateDisplay();
      setupLongPress(); 
      window.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { passive: false });
    });

    // 0.8秒長押しでリセット画面へ
    function setupLongPress() {
      const target = document.getElementById('grand-total-box');
      let pressTimer;

      const startPress = (e) => {
        if (e.cancelable) e.preventDefault();
        clearTimeout(pressTimer);
        pressTimer = setTimeout(() => { triggerResetAuth(); }, 800);
      };

      const cancelPress = (e) => { clearTimeout(pressTimer); };

      target.addEventListener('touchstart', startPress, { passive: false });
      target.addEventListener('touchend', cancelPress, { passive: false });
      target.addEventListener('touchmove', cancelPress, { passive: false });
      target.addEventListener('mousedown', startPress);
      target.addEventListener('mouseup', cancelPress);
      target.addEventListener('mouseleave', cancelPress);
    }

    function triggerResetAuth() {
      const password = prompt("Please enter the reset password:");
      if (password === "0425") {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        hasCelebrated = false;
        updateDisplay();
        alert("Today's counters have been reset to 0.");
      } else if (password !== null) {
        alert("Incorrect password.");
      }
    }

    function getOrCreateDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'ipad_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    function checkDateReset() {
      const todayStr = new Date().toLocaleDateString('ja-JP');
      const savedDate = localStorage.getItem('lastSavedDate');
      if (savedDate !== todayStr) {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('lastSavedDate', todayStr);
        hasCelebrated = false;
      }
    }

    function updateDisplay() {
      checkDateReset();
      
      let tMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let tVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalM = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalV = parseInt(localStorage.getItem('total_visitor') || '0', 10);
      let grandTotal = totalM + totalV;

      document.getElementById('count-member').innerText = tMember;
      document.getElementById('count-visitor').innerText = tVisitor;
      
      const totalEl = document.getElementById('grand-total');
      totalEl.innerText = grandTotal.toLocaleString();

      // 🌟 【判定】テスト中につき累計10人で発火 (本番稼働時は 1000 に変更してください)
      const target = 10; 
      if (grandTotal === target && !hasCelebrated) {
        performUltimateCelebration(totalEl);
        hasCelebrated = true; 
      }
    }

    // 🌟 金色オーラフラッシュ＋心臓パルス＋優雅な散華の複合演出
    function performUltimateCelebration(element) {
      const flashBg = document.getElementById('flash-bg');
      
      // 1. 画面フラッシュ発動
      flashBg.classList.add('flash-active');
      setTimeout(() => { flashBg.classList.remove('flash-active'); }, 500);

      // 2. 数字の巨大オーラパルスモード化
      element.classList.add('celebrate-mode');
      
      // 3. 散華舞踊スタート
      triggerSangeEffect();
      
      // 4. 5秒間ドクン見せた後にスムーズに通常サイズへ復帰
      setTimeout(() => {
        element.classList.remove('celebrate-mode');
      }, 5000);
    }

    // 優雅な伝統散華ロジック
    function triggerSangeEffect() {
      const sangeLayer = document.getElementById('sange-layer');
      const colors = ['pink', 'blue', 'green', 'yellow', 'purple'];
      const petalCount = 45; 

      for (let i = 0; i < petalCount; i++) {
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        const wrapper = document.createElement('div');
        wrapper.className = 'sange-petal-wrapper';

        const svgNS = "http://www.w3.org/2000/svg";
        const svgPetal = document.createElementNS(svgNS, "svg");
        svgPetal.setAttribute("class", "sange-petal");
        svgPetal.setAttribute("viewBox", "0 0 50 50");
        svgPetal.setAttribute("fill", `url(#sange-${randomColor})`);
        // 縁だけ少し色づく水彩画の輪郭をシミュレート
        svgPetal.setAttribute("stroke", randomColor === 'pink' ? '#ff69b4' : (randomColor === 'blue' ? '#4682b4' : '#ffd700'));
        svgPetal.setAttribute("stroke-width", "0.4");
        svgPetal.setAttribute("stroke-opacity", "0.6");

        const useTag = document.createElementNS(svgNS, "use");
        useTag.setAttributeNS("http://www.w3.org/1999/xlink", "href", "#sange-petal-shape");
        svgPetal.appendChild(useTag);
        wrapper.appendChild(svgPetal);

        // iPad幅4cm相当の大きさ（約70px〜100px）へ上品に分散
        const size = 70 + Math.random() * 30;
        wrapper.style.width = `${size}px`;
        wrapper.style.height = `${size}px`;

        const startLeft = Math.random() * 95; 
        wrapper.style.left = `${startLeft}%`;

        // 仏教の優雅さを出すため時間差ディレイと長めの滞空時間（6〜10秒）
        const animationDelay = Math.random() * 5.0;
        const fallDuration = 6.5 + Math.random() * 3.5; 
        const swayDuration = 4.0 + Math.random() * 2.5; // 大きくゆっくり回るピッチ

        wrapper.style.animationDelay = `${animationDelay}s`;
        wrapper.style.animationDuration = `${fallDuration}s`;

        const swayType = Math.random() > 0.5 ? 'sangeSwayLeft' : 'sangeSwayRight';
        svgPetal.style.animation = `${swayType} ${swayDuration}s ease-in-out infinite`;

        sangeLayer.appendChild(wrapper);

        setTimeout(() => { wrapper.remove(); }, (animationDelay + fallDuration) * 1000);
      }
    }

    function handleCounterClick(type, circleElement) {
      checkDateReset();

      let todayMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let todayVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalMember = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalVisitor = parseInt(localStorage.getItem('total_visitor') || '0', 10);

      if (type === 'member') {
        todayMember++; totalMember++;
      } else {
        todayVisitor++; totalVisitor++;
      }

      localStorage.setItem('today_member', todayMember.toString());
      localStorage.setItem('today_visitor', todayVisitor.toString());
      localStorage.setItem('total_member', totalMember.toString());
      localStorage.setItem('total_visitor', totalVisitor.toString());

      updateDisplay();
      createTripleRipple(circleElement, type);

      const payload = {
        type: "click_counter",
        date: localStorage.getItem('lastSavedDate'),
        memberToday: todayMember,
        visitorToday: todayVisitor,
        totalToday: todayMember + todayVisitor,
        deviceId: getOrCreateDeviceId()
      };
      requestQueue.push(payload);
      processQueue();
    }

    function createTripleRipple(button, type) {
      const delays = [0, 700, 1400];
      delays.forEach(delay => {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          if (type === 'visitor') ripple.classList.add('ripple-visitor');
          button.appendChild(ripple);
          setTimeout(() => ripple.remove(), 4000);
        }, delay);
      });
    }

    function processQueue() {
      if (isSending || requestQueue.length === 0) return;
      isSending = true;
      document.getElementById('status-message').innerText = "Syncing... (" + requestQueue.length + ")";

      const currentPayload = requestQueue[0];
      fetch(gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(currentPayload)
      })
      .then(res => { requestQueue.shift(); })
      .catch(err => { console.error("Transmission failed:", err); })
      .finally(() => {
        isSending = false;
        if (requestQueue.length === 0) document.getElementById('status-message').innerText = "";
        setTimeout(processQueue, 100);
      });
    }
  </script>
</body>
</html>
