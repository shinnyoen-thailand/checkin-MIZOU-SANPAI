<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="COUNTER">

  <title>Attendance Counter</title>
  <style>
    :root {
      --bg-glass: rgba(255, 255, 255, 0.25);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background-image: url('外観.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      overflow: hidden;
      
      -webkit-touch-callout: none !important;
      -webkit-user-select: none !important;
      user-select: none !important;
      display: flex;
      flex-direction: column;
    }

    /* 📦 メインコンテナ（ヘッダーを無くしたため全面に余白を持って配置） */
    .container {
      display: flex;
      flex: 1;
      padding: 35px;
      gap: 30px;
      box-sizing: border-box;
    }

    .card {
      flex: 1;
      background-color: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 35px;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card-title {
      font-size: 50px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.6);
      margin: 0 0 5px 0;
      text-align: center;
      z-index: 6;
      letter-spacing: 1px;
    }

    /* 累計（Total）の小さな文字表示スタイル */
    .total-display {
      font-size: 20px;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.75);
      text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
      margin-bottom: 5px;
      z-index: 6;
    }

    .counter-display {
      font-size: 130px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 2px 4px 15px rgba(0,0,0,0.7);
      font-variant-numeric: tabular-nums;
      margin: 0 0 10px 0;
      z-index: 6;
      line-height: 1.1;
    }

    .footprint-zone {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .ripple-button {
      position: relative;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(135, 206, 250, 0.95) 0%, rgba(30, 144, 255, 0.45) 70%, rgba(0, 191, 255, 0) 100%);
      box-shadow: 0 0 35px rgba(0, 191, 255, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.5);
      transition: transform 0.05s;
      z-index: 3;
      cursor: pointer;
    }

    /* Visitor用ボタンの色を緑系グラデーションにして識別しやすく調整 */
    .btn-visitor-color {
      background: radial-gradient(circle, rgba(167, 243, 208, 0.95) 0%, rgba(16, 185, 129, 0.45) 70%, rgba(52, 211, 153, 0) 100%) !important;
      box-shadow: 0 0 35px rgba(16, 185, 129, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.6) !important;
    }

    .ripple-effect {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      margin-top: -110px;
      margin-left: -110px;
      border-radius: 50%;
      border: 3px solid rgba(0, 225, 255, 0.85);
      background: radial-gradient(circle, rgba(0, 225, 255, 0.1) 0%, rgba(0, 225, 255, 0) 70%);
      pointer-events: none;
      z-index: 4;
      animation: rippleSpread 4.0s cubic-bezier(0.1, 0.2, 0.3, 1) forwards;
    }

    /* Visitor用の波紋カラー */
    .ripple-visitor {
      border: 3px solid rgba(52, 211, 153, 0.85) !important;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.1) 0%, rgba(52, 211, 153, 0) 70%) !important;
    }

    @keyframes rippleSpread {
      0% { transform: scale(0); opacity: 1; border-width: 5px; }
      20% { opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; border-width: 0.5px; }
    }

    .ripple-button:active {
      transform: scale(0.92);
    }

    .walking-step {
      position: absolute;
      width: 350px;
      height: 350px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* 📡 同期中ステータス表示（目立たないよう画面最下部に配置） */
    #status-message {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      height: 15px;
      z-index: 100;
      pointer-events: none;
    }

    @keyframes walkUpLeft {
      0% { transform: translateY(300px) translateX(-60px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-150px) translateX(-60px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-220px) translateX(-60px) rotate(-10deg); opacity: 0; }
    }

    @keyframes walkUpRight {
      0% { transform: translateY(160px) translateX(60px) rotate(10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-280px) translateX(60px) rotate(10deg); opacity: 0.75; }
      100% { transform: translateY(-350px) translateX(60px) rotate(10deg); opacity: 0; }
    }

    @keyframes walkUpFinal {
      0% { transform: translateY(20px) translateX(-40px) rotate(-10deg); opacity: 0; }
      15% { opacity: 0.75; }
      85% { transform: translateY(-420px) translateX(-40px) rotate(-10deg); opacity: 0.75; }
      100% { transform: translateY(-500px) translateX(-40px) rotate(-10deg) scale(0.85); opacity: 0; }
    }
  </style>
</head>
<body>
  
  <div class="container">
    <div class="card">
      <h2 class="card-title">MEMBER</h2>
      <div class="total-display">Total: <span id="total-member">0</span></div>
      <div class="counter-display" id="count-member">0</div>
      
      <div class="footprint-zone">
        <div class="ripple-button" onclick="handleCounterClick('member', this)"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">VISITOR</h2>
      <div class="total-display">Total: <span id="total-visitor">0</span></div>
      <div class="counter-display" id="count-visitor">0</div>
      
      <div class="footprint-zone">
        <div class="ripple-button btn-visitor-color" onclick="handleCounterClick('visitor', this)"></div>
      </div>
    </div>
  </div>

  <div id="status-message"></div>

  <script>
    // 🔗 GAS Web App URL (ここに新しく作成、または既存のGASのURLを貼り付けてください)
    const gasUrl = 'https://script.google.com/macros/s/AKfycbyBnDj17Ni5-UkB0xK3CQrAk7DNBgY2Nm6bJ207lQ1TXnowDPjF6TujSLKa1aqjBvsD/exec';

    // 非同期送信待ち用のキュー（配列）と送信中フラグ
    let requestQueue = [];
    let isSending = false;

    window.addEventListener('DOMContentLoaded', () => {
      updateDisplay();
      window.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { passive: false });
    });

    function getOrCreateDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'ipad_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    // 日付が変わったら当日の数字だけを0に自動リセットする関数
    function checkDateReset() {
      const todayStr = new Date().toLocaleDateString('ja-JP');
      const savedDate = localStorage.getItem('lastSavedDate');

      if (savedDate !== todayStr) {
        localStorage.setItem('today_member', '0');
        localStorage.setItem('today_visitor', '0');
        localStorage.setItem('lastSavedDate', todayStr);
      }
    }

    function updateDisplay() {
      checkDateReset();
      document.getElementById('count-member').innerText = localStorage.getItem('today_member') || '0';
      document.getElementById('count-visitor').innerText = localStorage.getItem('today_visitor') || '0';
      document.getElementById('total-member').innerText = localStorage.getItem('total_member') || '0';
      document.getElementById('total-visitor').innerText = localStorage.getItem('total_visitor') || '0';
    }

    // 🚀 タップ時の高速カウント処理（ボタンロックなし、アニメーション即時実行）
    function handleCounterClick(type, circleElement) {
      checkDateReset();

      // 1. iPad内の数値を即座にカウントアップ
      let todayMember = parseInt(localStorage.getItem('today_member') || '0', 10);
      let todayVisitor = parseInt(localStorage.getItem('today_visitor') || '0', 10);
      let totalMember = parseInt(localStorage.getItem('total_member') || '0', 10);
      let totalVisitor = parseInt(localStorage.getItem('total_visitor') || '0', 10);

      if (type === 'member') {
        todayMember++;
        totalMember++;
      } else {
        todayVisitor++;
        totalVisitor++;
      }

      localStorage.setItem('today_member', todayMember.toString());
      localStorage.setItem('today_visitor', todayVisitor.toString());
      localStorage.setItem('total_member', totalMember.toString());
      localStorage.setItem('total_visitor', totalVisitor.toString());

      // 2. 即座に画面上の数値を更新
      updateDisplay();

      // 3. 波紋と足跡の視覚エフェクトを実行
      createTripleRipple(circleElement, type);
      const zone = circleElement.parentElement;
      spawnFootprints(zone);

      // 4. 最新のカウント情報を送信キューに入れてバックグラウンド送信
      const payload = {
        type: "click_counter",
        date: localStorage.getItem('lastSavedDate'),
        memberToday: todayMember,
        visitorToday: todayVisitor,
        totalToday: todayMember + todayVisitor,
        deviceId: getOrCreateDeviceId()
      };
      requestQueue.push(payload);

      // キューの処理を開始
      processQueue();
    }

    function createTripleRipple(button, type) {
      const delays = [0, 700, 1400];
      delays.forEach(delay => {
        setTimeout(() => {
          const ripple = document.createElement('div');
          ripple.className = 'ripple-effect';
          if (type === 'visitor') {
            ripple.classList.add('ripple-visitor');
          }
          button.appendChild(ripple);
          setTimeout(() => ripple.remove(), 4000);
        }, delay);
      });
    }

    function spawnFootprints(zone) {
      const animations = ['walkUpLeft', 'walkUpRight', 'walkUpFinal'];
      const svgs = [leftFootSVG, rightFootSVG, leftFootSVG];
      const delays = [0, 650, 1300];

      animations.forEach((anim, index) => {
        setTimeout(() => {
          const step = document.createElement('div');
          step.className = 'walking-step';
          step.innerHTML = svgs[index];
          step.style.animation = `${anim} 2.4s cubic-bezier(0.25, 1, 0.5, 1) forwards`;
          zone.appendChild(step);
          setTimeout(() => step.remove(), 2400);
        }, delays[index]);
      });
    }

    const leftFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(255,255,255,0.65); filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.3));"><path d="M52,85 C45,85 42,75 44,62 C46,52 38,44 40,34 C42,26 52,25 56,32 C60,39 56,48 58,58 C60,68 60,85 52,85 Z"/><circle cx="61" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="41" cy="19" r="4"/><circle cx="33" cy="24" r="3.5"/><circle cx="27" cy="31" r="3"/></svg>`;
    const rightFootSVG = `<svg width="100%" height="100%" viewBox="0 0 100 100" style="fill: rgba(255,255,255,0.65); filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.3));"><path d="M48,85 C55,85 58,75 56,62 C54,52 62,44 60,34 C58,26 48,25 44,32 C40,39 44,48 42,58 C40,68 40,85 48,85 Z"/><circle cx="39" cy="18" r="6"/><circle cx="50" cy="16" r="4.5"/><circle cx="59" cy="19" r="4"/><circle cx="67" cy="24" r="3.5"/><circle cx="73" cy="31" r="3"/></svg>`;

    // 🔄 バックグラウンドで送信キューを順番に安全処理する関数（連打バグ回避の肝）
    function processQueue() {
      if (isSending || requestQueue.length === 0) return;

      isSending = true;
      document.getElementById('status-message').innerText = "Syncing... (" + requestQueue.length + ")";

      const currentPayload = requestQueue[0];

      fetch(gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(currentPayload)
      })
      .then(res => {
        // 送信成功時、処理済みのタスクをキューから削除
        requestQueue.shift();
      })
      .catch(err => {
        console.error("Transmission failed, will retry later:", err);
      })
      .finally(() => {
        isSending = false;
        if (requestQueue.length === 0) {
          document.getElementById('status-message').innerText = "";
        }
        // 次のデータがあれば100ms後に自動処理
        setTimeout(processQueue, 100);
      });
    }
  </script>
</body>
</html>
